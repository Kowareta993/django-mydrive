<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}
        MyDrive
      {% endblock title %}
    </title>
    {% load static %}
    <link rel="icon" type="image/x-icon" href="{% static 'ui/logo.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css"
          rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div class="container">
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <a class="navbar-brand d-flex align-items-center"
             href="{% url "ui:index" %}">
            <img src="{% static 'ui/logo.png' %}"
                 alt="Site Icon"
                 width="50"
                 class="me-2">
            <span>MyDrive</span>
          </a>
          {% if api_user %}
            <div class="d-flex">
              <span class="me-3 text-secondary">Username: <strong>{{ api_user.username }}</strong></span>
              <span class="me-3 text-secondary">Email: <strong>{{ api_user.email }}</strong></span>
              <a href="{% url 'ui:logout' %}" class="btn btn-outline-danger btn-sm">Logout</a>
            </div>
          {% endif %}
        </div>
      </nav>
      {% block content %}
      {% endblock content %}
    </div>
    {% block script %}{% endblock script %}
  </body>
</html>
