{% extends "form.html" %}
{% block title %}
    Delete - MyDrive
{% endblock title %}
{% block header %}
    Confirm Delete
{% endblock header %}
{% block actions %}
    <button type="submit" class="btn btn-primary">Delete</button>
    <a href="{% if parent_id %} {% url 'ui:folder' pk=parent_id %} {% else %} {% url 'ui:index' %} {% endif %}"
       class="btn btn-secondary">Cancel</a>
{% endblock actions %}
