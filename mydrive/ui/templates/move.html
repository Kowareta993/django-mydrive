{% extends "form.html" %}
{% block title %}
    Move
    {% if is_file %}
        File
    {% else %}
        Folder
    {% endif %}
    - MyDrive
{% endblock title %}
{% block header %}
    Move a
    {% if is_file %}
        File
    {% else %}
        Folder
    {% endif %}
{% endblock header %}
{% block actions %}
    <button type="submit" class="btn btn-primary">Move</button>
    <a href="{% if parent_id %} {% url 'ui:folder' pk=parent_id %} {% else %} {% url 'ui:index' %} {% endif %}"
       class="btn btn-secondary">Cancel</a>
{% endblock actions %}
